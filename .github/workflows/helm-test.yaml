name: Helm Chart Test

permissions:
  contents: read

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'Dockerfile'
      - 'deploy/helm/kafka-backup-operator/**'
      - '.github/workflows/helm-test.yaml'

jobs:
  helm-lint:
    name: Helm Lint & Template
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Helm
        uses: azure/setup-helm@b9e51907a09c216f16ebe8536097933489208112 # v4.3.0
        with:
          version: v3.14.4

      - name: Helm lint
        run: helm lint deploy/helm/kafka-backup-operator

      - name: Helm template (default values)
        run: helm template test-release deploy/helm/kafka-backup-operator > /dev/null

      - name: Helm template (azure workload identity)
        run: |
          helm template test-release deploy/helm/kafka-backup-operator \
            --set azureWorkloadIdentity.enabled=true \
            --set azureWorkloadIdentity.clientId=test-client-id > /dev/null

      - name: Helm template (leader election)
        run: |
          helm template test-release deploy/helm/kafka-backup-operator \
            --set leaderElection.enabled=true > /dev/null

      - name: Helm template (service monitor)
        run: |
          helm template test-release deploy/helm/kafka-backup-operator \
            --set metrics.serviceMonitor.enabled=true > /dev/null

  helm-install:
    name: Helm Install (kind)
    runs-on: ubuntu-latest
    needs: helm-lint
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Build operator image locally
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          load: true
          tags: kafka-backup-operator:ci-test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set up Helm
        uses: azure/setup-helm@b9e51907a09c216f16ebe8536097933489208112 # v4.3.0
        with:
          version: v3.14.4

      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          cluster_name: chart-test

      - name: Load image into kind
        run: kind load docker-image kafka-backup-operator:ci-test --name chart-test

      - name: Helm install
        run: |
          helm install kafka-backup-operator deploy/helm/kafka-backup-operator \
            --set image.repository=kafka-backup-operator \
            --set image.tag=ci-test \
            --set image.pullPolicy=IfNotPresent \
            --wait --timeout 3m

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/kafka-backup-operator --timeout=60s
          kubectl get pods -l app.kubernetes.io/name=kafka-backup-operator

      - name: Dump diagnostics on failure
        if: failure()
        run: |
          echo "=== Pods ==="
          kubectl get pods -A -o wide
          echo "=== Describe operator pods ==="
          kubectl describe pods -l app.kubernetes.io/name=kafka-backup-operator
          echo "=== Operator logs ==="
          kubectl logs -l app.kubernetes.io/name=kafka-backup-operator --tail=200 --all-containers=true || true
          echo "=== Events ==="
          kubectl get events --sort-by=.lastTimestamp -A
