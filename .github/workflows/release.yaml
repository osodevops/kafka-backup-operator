name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: write
  packages: write

jobs:
  validate:
    name: Validate Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Release version: $VERSION"

      - name: Verify Cargo.toml version matches tag
        run: |
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "Error: Cargo.toml version ($CARGO_VERSION) does not match tag version ($TAG_VERSION)"
            exit 1
          fi
          echo "Version verified: $CARGO_VERSION"

  test:
    name: Pre-release Tests
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
          components: clippy, rustfmt

      - name: Cache cargo registry
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-test-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --all-features
        env:
          RUST_LOG: debug

  build-and-push:
    name: Build and Push Docker Image (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs: [validate, test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Log in to Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push Docker image by digest
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}

      - name: Smoke test - verify binary is linked and executable
        run: |
          IMAGE_REF="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}"
          docker run --rm --platform ${{ matrix.platform }} --entrypoint ldd "$IMAGE_REF" --version
          docker run --rm --platform ${{ matrix.platform }} --entrypoint ls "$IMAGE_REF" -la /usr/local/bin/operator
          echo "Docker smoke test passed for ${{ matrix.platform }}!"

      - name: Export image digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload image digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digests-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge-docker-manifest:
    name: Merge Docker Manifest
    runs-on: ubuntu-latest
    needs: [validate, build-and-push]
    steps:
      - name: Download image digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Log in to Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Create and push manifest list
        run: |
          IMAGE_REF="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"

          tag_args=()
          while IFS= read -r tag; do
            tag_args+=("-t" "$tag")
          done <<< "${{ steps.meta.outputs.tags }}"

          digest_args=()
          while IFS= read -r digest_file; do
            digest_args+=("${IMAGE_REF}@sha256:$(basename "$digest_file")")
          done < <(find /tmp/digests -type f | sort)

          docker buildx imagetools create "${tag_args[@]}" "${digest_args[@]}"

      - name: Verify published multi-arch manifest
        run: |
          IMAGE_REF="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.validate.outputs.version }}"
          docker buildx imagetools inspect "$IMAGE_REF" | tee manifest.txt
          grep -q 'Platform:.*linux/amd64' manifest.txt
          grep -q 'Platform:.*linux/arm64' manifest.txt
          echo "Published multi-arch manifest includes linux/amd64 and linux/arm64"

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [validate, merge-docker-manifest]
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          fetch-depth: 0
          fetch-tags: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable

      - name: Generate CRDs
        run: |
          cargo build --release --bin crdgen
          ./target/release/crdgen > crds.yaml

      - name: Generate changelog
        id: changelog
        run: |
          TAG="${GITHUB_REF#refs/tags/}"

          # Find the previous tag for changelog generation
          PREV_TAG=$(git tag --sort=-v:refname | grep -A1 "^${TAG}$" | tail -1)
          if [ "$PREV_TAG" = "$TAG" ] || [ -z "$PREV_TAG" ]; then
            PREV_TAG=$(git rev-list --max-parents=0 HEAD | head -1)
          fi
          echo "Generating changelog: ${PREV_TAG}..${TAG}"

          # Generate changelog grouped by conventional commit type
          echo "## What's Changed" > changelog.md

          FEATURES=$(git log "${PREV_TAG}..${TAG}" --oneline --grep="^feat" --format="* %s" 2>/dev/null | head -20)
          if [ -n "$FEATURES" ]; then
            {
              echo ""
              echo "### Features"
              echo "$FEATURES"
            } >> changelog.md
          fi

          FIXES=$(git log "${PREV_TAG}..${TAG}" --oneline --grep="^fix" --format="* %s" 2>/dev/null | head -20)
          if [ -n "$FIXES" ]; then
            {
              echo ""
              echo "### Fixes"
              echo "$FIXES"
            } >> changelog.md
          fi

          DEPS=$(git log "${PREV_TAG}..${TAG}" --oneline --grep="^deps\|^dep\|^chore(deps)\|Bump" --format="* %s" 2>/dev/null | head -20)
          if [ -n "$DEPS" ]; then
            {
              echo ""
              echo "### Dependencies"
              echo "$DEPS"
            } >> changelog.md
          fi

          OTHER=$(git log "${PREV_TAG}..${TAG}" --oneline --grep="^ci\|^chore\|^style\|^refactor" --format="* %s" 2>/dev/null | head -20)
          if [ -n "$OTHER" ]; then
            {
              echo ""
              echo "### Other"
              echo "$OTHER"
            } >> changelog.md
          fi

          {
            echo ""
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${TAG}"
          } >> changelog.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v2
        with:
          name: v${{ needs.validate.outputs.version }}
          body_path: changelog.md
          files: |
            crds.yaml
          draft: false
          prerelease: ${{ contains(github.ref, '-') }}
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}

  sync-helm-chart:
    name: Sync Helm Chart to helm-charts
    runs-on: ubuntu-latest
    needs: [validate, create-release]
    env:
      SOURCE_CHART_PATH: deploy/helm/kafka-backup-operator
      TARGET_REPO: osodevops/helm-charts
      TARGET_CHART_PATH: charts/kafka-backup-operator
      BRANCH_NAME: sync/kafka-backup-operator-chart
    steps:
      - name: Checkout source repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          path: source-repo

      - name: Checkout target repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: ${{ env.TARGET_REPO }}
          token: ${{ secrets.HELM_CHARTS_PAT }}
          path: target-repo
          fetch-depth: 0

      - name: Sync Helm chart
        run: |
          mkdir -p target-repo/${{ env.TARGET_CHART_PATH }}
          rm -rf target-repo/${{ env.TARGET_CHART_PATH }}/*
          cp -r source-repo/${{ env.SOURCE_CHART_PATH }}/* target-repo/${{ env.TARGET_CHART_PATH }}/

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          token: ${{ secrets.HELM_CHARTS_PAT }}
          path: target-repo
          branch: ${{ env.BRANCH_NAME }}
          delete-branch: true
          title: "chore(kafka-backup-operator): sync chart v${{ needs.validate.outputs.version }}"
          body: |
            ## Summary

            Automated sync of `kafka-backup-operator` Helm chart.

            **Chart Version:** `${{ needs.validate.outputs.version }}`
            **App Version:** `${{ needs.validate.outputs.version }}`
            **Source Commit:** [`${{ github.sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
            **Source Release:** [v${{ needs.validate.outputs.version }}](${{ github.server_url }}/${{ github.repository }}/releases/tag/v${{ needs.validate.outputs.version }})

            Image `ghcr.io/osodevops/kafka-backup-operator:${{ needs.validate.outputs.version }}` was published by the upstream release workflow before this PR was opened.

            ---
            *Auto-generated by [Release Workflow](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})*
          commit-message: |
            chore(kafka-backup-operator): sync chart v${{ needs.validate.outputs.version }}

            Source: ${{ github.repository }}@${{ github.sha }}
          labels: |
            automated
            helm-chart
          assignees: sionsmith
