                  - status
                  - type
                  type: object
                type: array
              lastBackupTime:
                description: Last backup timestamp
                format: date-time
                nullable: true
                type: string
              lastCheckpointTime:
                description: Last checkpoint timestamp
                format: date-time
                nullable: true
                type: string
              lastScheduleTime:
                description: Authoritative timestamp of the most recent scheduled tick the operator has begun processing. Modelled on Kubernetes CronJob's `.status.lastScheduleTime`. Used as the monotonic anchor in `should_run_backup` so scheduling is immune to reflector-cache lag between a tick's `Running` patch and its `Completed` patch.
                format: date-time
                nullable: true
                type: string
              message:
                description: Human-readable message
                nullable: true
                type: string
              nextScheduledBackup:
                description: Next scheduled backup timestamp
                format: date-time
                nullable: true
                type: string
              observedGeneration:
                description: Observed generation
                format: int64
                nullable: true
                type: integer
              phase:
                description: Current phase (Pending, Running, Completed, Failed)
                nullable: true
                type: string
              recordsProcessed:
                description: Records processed in current/last backup
                format: uint64
                minimum: 0.0
                nullable: true
                type: integer
              resumable:
                description: Whether the backup can be resumed
                nullable: true
                type: boolean
              segmentsCompleted:
                description: Segments completed in current/last backup
                format: uint64
                minimum: 0.0
                nullable: true
                type: integer
              throughputBytesPerSec:
                description: Throughput (bytes per second)
                format: double
                nullable: true
                type: number
              throughputRecordsPerSec:
                description: Throughput (records per second)
                format: double
                nullable: true
                type: number
            type: object
        required:
        - spec
        title: KafkaBackup
        type: object
    served: true
    storage: true
    subresources:
      status: {}
